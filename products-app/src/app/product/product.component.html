<div class="p-3">
  <div class="card-body">
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Price</th>
          <th>Selected</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of products">
          <th>{{p.id}}</th>
          <th>{{p.name}}</th>
          <th>{{p.price}}</th>
          <th>{{p.selected}}</th>
        </tr>
      </tbody>
    </table>
  </div>
</div>
